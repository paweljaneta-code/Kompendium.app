NERGII"</text><text x="310.38" y="103.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="32.28" lengthAdjust="spacingAndGlyphs">Energia</text><text x="345.37" y="103.5" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="38.09" lengthAdjust="spacingAndGlyphs">powstaje</text><text x="386.17" y="103.5" style="font-size:8.5px;fill:rgb(28,38,32);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="152.2" lengthAdjust="spacingAndGlyphs">z ruchu, nie poprzedza go. Pierwszy</text><text x="310.38" y="115.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="224.24" lengthAdjust="spacingAndGlyphs">tydzień zacznij od 5 min. Po 2 tyg. zauważysz wzrost</text><text x="310.38" y="127.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="103.66" lengthAdjust="spacingAndGlyphs">energii w innych dniach.</text><text x="54.35" y="159.75" style="font-size:7.99px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="57.7" lengthAdjust="spacingAndGlyphs">„NUDZĘ SIĘ"</text><text x="54.35" y="174.75" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="207.08" lengthAdjust="spacingAndGlyphs">Podcast, audiobook, muzyka. Aktywność z drugą</text><text x="54.35" y="187.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="221.22" lengthAdjust="spacingAndGlyphs">osobą — większa szansa wytrwania. Zmieniaj formy</text><text x="54.35" y="199.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="130.49" lengthAdjust="spacingAndGlyphs">co 2 tyg., żeby uniknąć rutyny.</text><text x="310.38" y="159.75" style="font-size:7.99px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="150.47" lengthAdjust="spacingAndGlyphs">„NIE UMIEM, CZUJĘ SIĘ GŁUPIO"</text><text x="310.38" y="174.75" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="208.27" lengthAdjust="spacingAndGlyphs">Zacznij od formy zupełnie indywidualnej (spacer,</text><text x="310.38" y="187.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="206.18" lengthAdjust="spacingAndGlyphs">rower). Aplikacja prowadząca (Couch to 5K, Nike</text><text x="310.38" y="199.5" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="207.15" lengthAdjust="spacingAndGlyphs">Training). Brak osądu = pierwsze 4 tyg. sukcesu.</text><text x="50.6" y="228.75" style="font-size:8.5px;fill:rgb(138,144,137);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="9.96" lengthAdjust="spacingAndGlyphs">04</text><text x="91.83" y="231" style="font-size:12.49px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="178.81" lengthAdjust="spacingAndGlyphs">Dziennik aktywności — 4 tygodnie</text><text x="51.73" y="259.5" style="font-size:7.99px;fill:rgb(138,144,137);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="25.65" lengthAdjust="spacingAndGlyphs">TYDZ.</text><text x="97.1" y="259.5" style="font-size:7.99px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="14.15" lengthAdjust="spacingAndGlyphs">DZ.</text><text x="157.8" y="259.5"
