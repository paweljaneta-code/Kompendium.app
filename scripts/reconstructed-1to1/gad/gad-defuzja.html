ength="173.3" lengthAdjust="spacingAndGlyphs">Wyobraź sobie, że myśl pojawia się na</text><text x="231.27" y="662.25" style="font-size:9px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="38.2" lengthAdjust="spacingAndGlyphs">ekranie</text><text x="55.1" y="675" style="font-size:9px;fill:rgb(28,38,32);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="55.07" lengthAdjust="spacingAndGlyphs">komputera</text><text x="110.18" y="675" style="font-size:9px;fill:rgb(28,38,32);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="157.21" lengthAdjust="spacingAndGlyphs">. Zmień jej czcionkę. Kolor. Animuj.</text><text x="55.1" y="687.75" style="font-size:9px;fill:rgb(28,38,32);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="93.3" lengthAdjust="spacingAndGlyphs">Daj jej kaczy głos. To</text><text x="151.27" y="687.75" style="font-size:9px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="22.5" lengthAdjust="spacingAndGlyphs">tekst</text><text x="173.77" y="687.75" style="font-size:9px;fill:rgb(138,144,137);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="87.37" lengthAdjust="spacingAndGlyphs">, nie rzeczywistość.</text><text x="311.13" y="647.25" style="font-size:7.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="86.23" lengthAdjust="spacingAndGlyphs">F · DZIĘKI, UMYŚLE</text><text x="311.13" y="662.25" style="font-size:9px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="81.74" lengthAdjust="spacingAndGlyphs">Powiedz w głowie:</text><text x="395.74" y="662.25" style="font-size:9px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helveti
