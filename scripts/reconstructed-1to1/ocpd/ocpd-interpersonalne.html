lizuję to później” — to próby</text><text x="333.4" y="420" style="font-size:10px;fill:rgb(28,38,32);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="68.02" lengthAdjust="spacingAndGlyphs">opanowania</text><text x="404.93" y="420" style="font-size:10px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="144.99" lengthAdjust="spacingAndGlyphs">emocji zamiast jej przeżycia.</text><text x="45.35" y="435" style="font-size:10px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="401.69" lengthAdjust="spacingAndGlyphs">Działają na chwilę, a długofalowo odcinają Cię od sygnałów, które emocje niosą.</text><text x="55.85" y="462.75" style="font-size:9px;fill:rgb(28,38,32);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="44.84" lengthAdjust="spacingAndGlyphs">Emocje to</text><text x="103.56" y="462.75" style="font-size:9px;fill:rgb(138,144,137);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="22.47" lengthAdjust="spacingAndGlyphs">dane</text><text x="126.04" y="462.75" style="font-size:9px;fill:rgb(138,144,137);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="385.95" lengthAdjust="spacingAndGlyphs">, nie usterka. Złość mówi o przekroczonej granicy, smutek o stracie, lęk o zagrożeniu.</text><text x="55.85" y="476.25" style="font-size:9px;fill:rgb(138,144,137);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="439.71" lengthAdjust="spacingAndGlyphs">Tłumiąc je, tracisz dostęp do tej informacji — a ona i tak działa, tyle że poza Twoją świadomością.</text><text x="50.6" y="504.75" style="font-size:8.5px;fill:rgb(28,38,32);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="9.96" lengthAdjust="spacingAndGlyphs">02</text><text x="91.83" y="507" style="font-size:12.49px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="184.75" lengthAdjust="spacingAndGlyphs">Nazwij emocję — i znajdź ją w ciele</text><text x="45.35" y="525.75" style="font-size:10px;fill:rgb(28,38,32);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="387.31" lengthAdjust="spacingAndGlyphs">Zacznij od prostego słownika. Wskaż emocję, dopisz, gdzie ją czujesz w ciele.</text><text x="53.6" y="552" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="70.5" lengthAdjust="spacingAndGlyphs">Złość · irytacja</text><text x="53.6" y="564.75" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="140.81" lengthAdjust="spacingAndGlyphs">napięta szczęka, gorąco w klatce</text><text x="223.78" y="552" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="59.23" lengthAdjust="spacingAndGlyphs">Smutek · żal</text><text x="223.78" y="564.75" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="127.62" lengthAdjust="spacingAndGlyphs">ciężar w piersi, ucisk w gardle</text><text x="393.97" y="552" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="66.78" lengthAdjust="spacingAndGlyphs">Lęk · niepokój</text><text x="393.97" y="564.75" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="131.32" lengthAdjust="spacingAndGlyphs">ścisk w brzuchu, szybsze tętno</text><text x="53.6" y="595.5" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="61.8" lengthAdjust="spacingAndGlyphs">Wstyd · wina</text><text x="53.6" y="607.5" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="134.01" lengthAdjust="spacingAndGlyphs">gorące policzki, chęć zniknięcia</text><text x="223.78" y="595.5" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="64.21" lengthAdjust="spacingAndGlyphs">Radość · ulga</text><text x="223.78" y="607.5" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="122.29" lengthAdjust="spacingAndGlyphs">lekkość, rozluźnienie barków</text><text x="393.97" y="595.5" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="74.11" lengthAdjust="spacingAndGlyphs">Inne: ___________</text><text x="393.97" y="607.5" style="font-size:8.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="103.07" lengthAdjust="spacingAndGlyphs">gdzie w ciele: __________</text><text x="45.35" y="815.25" style="font-size:7.5px;fill:rgb(61,107,48);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="310.95" lengthAdjust="spacingAndGlyphs">KOMPENDIUM NARZĘDZI TERAPEUTYCZNYCH · OCPD · LINEART V2</text><text x="525.74" y="815.25" style="font-size:7.5px;fill:rgb(74,85,77);font-style:italic;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="24.17" lengthAdjust="spacingAndGlyphs">str. 1 / 2</text></svg></div><div class="page"><svg class="pg" viewBox="0 0 594.96 841.92" xmlns="http://www.w3.org/2000/svg" font-family="'Liberation Sans',Arial,sans-se le="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="43.7" lengthAdjust="spacingAndGlyphs">oceniania.</text><text x="393.97" y="126" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="85.6" lengthAdjust="spacingAndGlyphs">3 · Pozwól przejść</text><text x="393.97" y="138" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="129.25" lengthAdjust="spacingAndGlyphs">Emocja zmieni się sama — nie</text><text x="393.97" y="150.75" style="font-size:8.5px;fill:rgb(74,85,77);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="88.33" lengthAdjust="spacingAndGlyphs">musisz jej popychać.</text><text x="50.6" y="178.5" style="font-size:8.5px;fill:rgb(74,85,77);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="9.96" lengthAdjust="spacingAndGlyphs">04</text><text x="91.83" y="180.75" style="font-size:12.49px;fill:rgb(138,144,137);font-weight:700;font-family:'Liberation Serif','Times New Roman',Georgia,serif" textLength="160.79" lengthAdjust="spacingAndGlyphs">Dziennik emocji — 3× dziennie</text><text x="45.35" y="199.5" style="font-size:10px;fill:rgb(138,144,137);font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="427.68" lengthAdjust="spacingAndGlyphs">Rano, w południe i wieczorem: nazwij emocję, miejsce w ciele i siłę. Bez naprawiania.</text><text x="51.73" y="231" style="font-size:7.99px;fill:rgb(138,144,137);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="25.01" lengthAdjust="spacingAndGlyphs">PORA</text><text x="122.31" y="231" style="font-size:7.99px;fill:rgb(138,144,137);font-weight:700;font-family:'Liberation Sans','DejaVu Sans',Arial,Helvetica,sans-serif" textLength="37.4" lengthA
